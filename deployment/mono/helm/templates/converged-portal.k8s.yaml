    {
      "name": "converged-portal",
      "landing": "front/landing",
      "spa": {
        "core": "front/front-core",
        "microfrontends": [
          "auth",
          "assistants",
          "community",
          "charts",
          "calls",
          "dag",
          "dasboards",
          "dumps",
          "docs",
          "landing",
          "logs",
          "markdown",
          "requests",
          "sheduller",
          "telemetry",
          "threads",
          "usage",
          "webhooks"
        ]
      },
      "back": {
        "core": "back/back-core",
        "microservices": {}
      }
    }
---
