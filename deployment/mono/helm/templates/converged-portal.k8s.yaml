---
apiVersion: v1
kind: Service
metadata:
  name: converged-portal-mono-headless
spec:
  clusterIP: None
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: converged-portal
    component: mono
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: converged-portal
    component: mono
  name: converged-portal-mono
spec:
  replicas: 1
  selector:
    matchLabels:
      app: converged-portal
      component: mono
  serviceName: converged-portal-mono-headless
  template:
    metadata:
      labels:
        app: converged-portal
        component: mono
    spec:
      containers:
        - env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATA_DIR
              value: /app/data
            - name: CONFIG_PATH
              value: /app/config/config.json
          envFrom:
            - secretRef:
                name: converged-portal-secrets
          image: "{{ .Values.images.ui.name }}:{{ .Values.images.ui.tag }}"
          imagePullPolicy: "{{ .Values.images.ui.pullPolicy }}"
          name: ui
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /app/data
              name: converged-portal-mono-data
            - mountPath: /app/config
              name: ui-config
              readOnly: true
        - env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATA_DIR
              value: /app/data
            - name: CONFIG_PATH
              value: /app/config/config.json
            - name: STORAGE_SOCKET_PATH
              value: /app/socket/storage.sock
          envFrom:
            - secretRef:
                name: converged-portal-secrets
          image: "{{ .Values.images.ms.name }}:{{ .Values.images.ms.tag }}"
          imagePullPolicy: "{{ .Values.images.ms.pullPolicy }}"
          name: services
          ports:
            - containerPort: 3001
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 300m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /app/data
              name: converged-portal-mono-data
            - mountPath: /app/config
              name: services-config
              readOnly: true
            - mountPath: /app/socket
              name: storage-socket
        - command:
            - /app/storage
            - start
            - --data-dir
            - /app/data
            - --socket
            - /app/socket/storage.sock
          image: "{{ .Values.images.storage.name }}:{{ .Values.images.storage.tag }}"
          imagePullPolicy: "{{ .Values.images.storage.pullPolicy }}"
          name: storage
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          volumeMounts:
            - mountPath: /app/data
              name: converged-portal-mono-data
            - mountPath: /app/socket
              name: storage-socket
      securityContext:
        runAsNonRoot: false
      volumes:
        - configMap:
            name: converged-portal-mono-ui-config
          name: ui-config
        - configMap:
            name: converged-portal-mono-services-config
          name: services-config
        - emptyDir: {}
          name: storage-socket
  volumeClaimTemplates:
    - metadata:
        name: converged-portal-mono-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
        storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: converged-portal
    component: ui
  name: converged-portal-ui
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: converged-portal
    component: mono
  type: ClusterIP
---
