apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: converged-portal-mono
  namespace: kube-system
spec:
  chartContent: 
  createNamespace: true
  targetNamespace: converged-portal

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.storage.converged.io
spec:
  group: storage.converged.io
  scope: Cluster
  names:
    plural: tenants
    singular: tenant
    kind: Tenant
    shortNames:
      - tenant
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                storageSize:
                  type: string
                  description: PVC size, e.g. "5Gi". Defaults to "5Gi".
                targetNamespace:
                  type: string
                  description: Namespace where storage pod is created. Defaults to "converged-portal".
                storageImage:
                  type: string
                  description: converged-storage container image. Defaults to "localhost/converged-storage:latest".
                domains:
                  type: array
                  description: Additional domains that should resolve to this tenant workspace. The operator also adds "<tenant>.4ir.club" by default.
                  items:
                    type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                reason:
                  type: string
                storageHost:
                  type: string
                  description: Full DNS hostname of the storage service.
                storagePort:
                  type: integer
                  format: int32
                observedGeneration:
                  type: integer
                  format: int64
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Host
          type: string
          jsonPath: .status.storageHost
        - name: Size
          type: string
          jsonPath: .spec.storageSize
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: converged-operator
  namespace: converged-portal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: converged-operator
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: converged-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: converged-operator
subjects:
  - kind: ServiceAccount
    name: converged-operator
    namespace: converged-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: converged-operator
  namespace: converged-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: converged-operator
  template:
    metadata:
      labels:
        app: converged-operator
    spec:
      serviceAccountName: converged-operator
      containers:
        - name: operator
          image: public.ecr.aws/i5x9u8b2/converged-operator:latest
          imagePullPolicy: Always
          args:
            - --leader-elect=false
          env:
            - name: STORAGE_IMAGE
              value: "public.ecr.aws/i5x9u8b2/converged-storage:latest"
            - name: TENANT_DOMAIN_BASE
              value: "4ir.club"
            - name: WORKSPACE_DOMAIN_CONFIGMAP
              value: "converged-portal-domains"
            - name: WORKSPACE_DOMAIN_NAMESPACE
              value: "converged-portal"
          ports:
            - containerPort: 8081
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
