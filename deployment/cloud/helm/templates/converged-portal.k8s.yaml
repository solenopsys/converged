              path: /health
              port: 3000
            periodSeconds: 2
            timeoutSeconds: 2
          volumeMounts:
            - mountPath: /app/data
              name: ui-data
            - mountPath: /app/config
              name: ui-config
              readOnly: true
      securityContext:
        runAsNonRoot: false
      volumes:
