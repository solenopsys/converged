            periodSeconds: 10
            timeoutSeconds: 2
          name: ui
          ports:
            - containerPort: 3000
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            failureThreshold: 120
