apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: converged-portal
    component: valkey
  name: converged-portal-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: converged-portal
      component: valkey
  template:
    metadata:
      labels:
        app: converged-portal
        component: valkey
    spec:
      containers:
        - command:
            - valkey-server
            - --save
            - ""
            - --appendonly
            - "no"
          env:
            - name: PORT
              value: "6379"
          image: "{{ .Values.images.valkey.name }}:{{ .Values.images.valkey.tag }}"
          imagePullPolicy: "{{ .Values.images.valkey.pullPolicy }}"
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            tcpSocket:
              port: 6379
            timeoutSeconds: 2
          name: valkey
          ports:
            - containerPort: 6379
          readinessProbe:
            failureThreshold: 6
            periodSeconds: 5
            tcpSocket:
              port: 6379
            timeoutSeconds: 2
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            failureThreshold: 60
            periodSeconds: 2
            tcpSocket:
              port: 6379
            timeoutSeconds: 2
      securityContext:
        runAsNonRoot: false
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: converged-portal
    component: valkey
  name: converged-portal-valkey
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: converged-portal
    component: valkey
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: converged-portal-storage-default-headless
spec:
  clusterIP: None
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: converged-portal
    component: storage-default
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: converged-portal
    component: storage-default
  name: converged-portal-storage-default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: converged-portal
      component: storage-default
  serviceName: converged-portal-storage-default-headless
  template:
    metadata:
      labels:
        app: converged-portal
        component: storage-default
    spec:
      containers:
        - command:
            - /app/storage
            - start
            - --data-dir
            - /app/data
            - --tcp
            - 0.0.0.0:9000
          image: "{{ .Values.images.storage.name }}:{{ .Values.images.storage.tag }}"
          imagePullPolicy: "{{ .Values.images.storage.pullPolicy }}"
          livenessProbe:
            exec:
              command:
                - /app/storage
                - health
                - --tcp
                - 127.0.0.1:9000
                - --timeout-ms
                - "1000"
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 2
          name: storage
          ports:
            - containerPort: 9000
          readinessProbe:
            exec:
              command:
                - /app/storage
                - health
                - --tcp
                - 127.0.0.1:9000
                - --timeout-ms
                - "1000"
            failureThreshold: 3
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 128Mi
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            exec:
              command:
                - /app/storage
                - health
                - --tcp
                - 127.0.0.1:9000
                - --timeout-ms
                - "1000"
            failureThreshold: 60
            periodSeconds: 2
            timeoutSeconds: 2
          volumeMounts:
            - mountPath: /app/data
              name: converged-portal-storage-default-data
      securityContext:
        runAsNonRoot: false
  volumeClaimTemplates:
    - metadata:
        name: converged-portal-storage-default-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: converged-portal
